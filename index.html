<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white w-full max-w-lg p-6 rounded-2xl shadow-xl">

    <!-- TITLE -->
    <h1 class="text-2xl font-bold text-center mb-6">Simple Todo List</h1>

    <!-- INPUT AREA -->
    <div class="flex gap-2 mb-4">
      <input
        id="input"
        type="text"
        placeholder="Tambah tugas..."
        class="flex-1 border px-3 py-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
      <button
        onclick="addTodo()"
        class="bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600"
      >Tambah</button>
    </div>

    <!-- ACTION BUTTON -->
    <div class="flex justify-between mb-4">
      <button
        onclick="clearAll()"
        class="text-red-500 hover:text-red-700 text-sm"
      >Hapus Semua</button>
    </div>

    <!-- LIST -->
    <ul id="list" class="space-y-2"></ul>

  </div>

  <script>

    const input = document.getElementById('input');
    const list = document.getElementById('list');

    // ADD TODO
    function addTodo() {
      const value = input.value.trim();

      if (value === '') {
        alert('Isi dulu tugasnya');
        return;
      }

      const li = document.createElement('li');
      li.className = "flex justify-between items-center bg-gray-50 px-3 py-2 rounded-xl";

      const text = document.createElement('span');
      text.textContent = value;
      text.className = "cursor-pointer";

      text.addEventListener('click', function () {
        text.classList.toggle('line-through');
      });

      const del = document.createElement('button');
      del.textContent = 'Hapus';
      del.className = "text-red-500 hover:text-red-700";

      del.addEventListener('click', function () {
        li.remove();
      });

      li.appendChild(text);
      li.appendChild(del);

      list.appendChild(li);

      input.value = '';
    }

    // ENTER KEY
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        addTodo();
      }
    });

    // CLEAR ALL
    function clearAll() {
      if (list.children.length === 0) {
        alert('Tidak ada tugas');
        return;
      }

      const confirmDelete = confirm('Yakin hapus semua?');

      if (confirmDelete) {
        while (list.firstChild) {
          list.removeChild(list.firstChild);
        }
      }
    }
  </script>

</body>
</html>
